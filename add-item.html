<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Item - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link href="css/bootstrap-override.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>

<body>
    <main class="container" style="margin-top:90px">
        <h1>Add New Item</h1>
        <form id="itemForm" class="row g-3 mt-3">
            <div class="col-md-6">
                <label class="form-label">Name</label>
                <input name="name" class="form-control" placeholder="Enter Your Name" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Category</label>
                <input name="category" class="form-control" placeholder="Category" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Price</label>
                <input name="price" type="number" step="0.1" class="form-control" placeholder="The Price" required>
            </div>
            <div class="col-12">
                <label class="form-label">Image URL</label>
                <input name="image" class="form-control" placeholder="Image URL">
            </div>
            <div class="col-12">
                <label class="form-label">Description</label>
                <textarea name="description" rows="4" class="form-control" placeholder="Descreption"></textarea>
            </div>
            <div class="col-12 text-end">
                <button id="submitBtn" class="btn btn-primary">Create</button>
                <a class="btn btn-secondary" href="admin.html">Cancel</a>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.getElementById('itemForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                name: form.name.value.trim(),
                category: form.category.value.trim(),
                price: parseFloat(form.price.value) || 0,
                image: form.image.value.trim(),
                description: form.description.value.trim()
            };
            if (!data.name) return UI.showToast('error','Name is required');
            UI.showSpinner('Creating item...');
            window.API.createItem(data).then(() => {
                UI.showToast('success','Item created');
                setTimeout(()=>location.href = 'admin.html', 600);
            }).catch(err => UI.showToast('error','Error: ' + err.message)).finally(()=>UI.hideSpinner());
        });
    </script>
</body>

</html>
