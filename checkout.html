<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout - Cindrella's Pie Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link href="css/bootstrap-override.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>

<body>
    <main class="container" style="margin-top:90px">
        <h1>Checkout</h1>
        <p>This is a demo checkout. No real payments are processed.</p>
        <div id="checkoutArea" class="mt-3"></div>
    </main>

    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Display cart summary & simple form
        const area = document.getElementById('checkoutArea');
        const cart = JSON.parse(localStorage.getItem('cart')||'[]');
        if (!cart.length) {
            area.innerHTML = '<p>Your cart is empty. <a href="menu.html">Browse menu</a></p>';
        } else {
            let total = 0;
            cart.forEach(i => total += (i.price||0) * (i.qty||1));
            area.innerHTML = `\n                <p>Items: ${cart.length}</p>\n                <p>Total: $${total.toFixed(2)}</p>\n                <button id='place' class='btn btn-success'>Place Order</button>`;
            document.getElementById('place').addEventListener('click', ()=>{
                UI.showSpinner('Placing order...');
                setTimeout(()=>{
                    localStorage.removeItem('cart');
                    UI.hideSpinner();
                    UI.showToast('success','Order placed (demo)');
                    setTimeout(()=>location.href = 'done.html', 500);
                }, 700);
            });
        }
    </script>
</body>

</html>
